<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đọc truyện - TruyệnHay</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/reader.css">
</head>
<body>

  <!-- ===== THANH TRÊN ===== -->
  <div class="reader-topbar">
    <!-- Nút về trang chủ -->
    <button class="back-btn" onclick="window.location.href='index.html'">
      ← Thư viện
    </button>

    <!-- Tên truyện (JS sẽ điền vào) -->
    <span class="story-name" id="ten-truyen">Đang tải...</span>

    <!-- Vị trí chương -->
    <span style="font-size:13px;color:#888;font-family:sans-serif;" id="vi-tri-chuong">
      1 / 1
    </span>
  </div>

  <!-- Thanh tiến trình đọc -->
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- ===== THANH CÔNG CỤ ===== -->
  <div class="reader-toolbar">

    <!-- Nhóm: Cỡ chữ -->
    <span class="toolbar-label">Cỡ chữ:</span>
    <!-- onclick gọi hàm datCochu() trong reader.js -->
    <button class="tool-btn btn-co-chu" id="btn-co-nho" onclick="datCochu('nho')">Nhỏ</button>
    <button class="tool-btn btn-co-chu active" id="btn-co-vua" onclick="datCochu('vua')">Vừa</button>
    <button class="tool-btn btn-co-chu" id="btn-co-lon" onclick="datCochu('lon')">Lớn</button>

    <div class="toolbar-divider"></div>

    <!-- Nhóm: Font chữ -->
    <span class="toolbar-label">Font:</span>
    <button class="tool-btn btn-font active" id="btn-font-serif" onclick="datFont('serif')">Serif</button>
    <button class="tool-btn btn-font" id="btn-font-sans"  onclick="datFont('sans')">Sans</button>
    <button class="tool-btn btn-font" id="btn-font-mono"  onclick="datFont('mono')">Mono</button>

    <div class="toolbar-divider"></div>

    <!-- Nút đặc biệt -->
    <button class="tool-btn" id="nut-bookmark">🔖 Đánh dấu</button>
    <button class="tool-btn" id="nut-toi">🌙 Chế độ tối</button>
  </div>

  <!-- ===== NỘI DUNG CHƯƠNG ===== -->
  <!-- id="reader-body" dùng để JS thêm class cỡ chữ / font -->
  <div class="reader-body font-vua font-serif" id="reader-body">

    <!-- Tiêu đề chương (JS điền vào) -->
    <h1 class="chapter-title" id="chuong-tieu-de">Đang tải...</h1>
    <p  class="chapter-subtitle" id="chuong-phu-de"></p>
    <hr class="chapter-divider">

    <!-- Nội dung truyện (JS điền vào) -->
    <div class="story-text" id="noi-dung"></div>

    <!-- Điều hướng chương dưới cùng -->
    <div class="chapter-nav-bottom">
      <button class="btn btn-outline" id="nut-truoc">← Chương trước</button>

      <div class="chapter-select-wrap">
        <span>Chọn chương:</span>
        <select id="chon-chuong"></select>
      </div>

      <button class="btn btn-primary" id="nut-sau">Chương sau →</button>
    </div>

  </div>

  <!-- Thông báo khi đánh dấu -->
  <div class="toast" id="toast">✅ Đã lưu đánh dấu!</div>

  <!-- JS — data.js phải load trước reader.js -->
  <script src="js/data.js"></script>
  <script src="js/reader.js"></script>

</body>
</html>
