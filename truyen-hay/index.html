<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruyệnHay - Đọc truyện online</title>

  <!-- Liên kết file CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="logo">📖 TruyệnHay</div>

    <ul class="nav-links">
      <li><a href="index.html">Trang chủ</a></li>
      <li><a href="#">Thể loại</a></li>
      <li><a href="#">Xếp hạng</a></li>
    </ul>

    <!-- Thanh tìm kiếm -->
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Tìm truyện, tác giả...">
    </div>
  </nav>

  <!-- ===== BANNER ===== -->
  <div class="hero">
    <h1>🌟 Thế giới truyện vô tận</h1>
    <p>Hàng ngàn tác phẩm hay đang chờ bạn khám phá</p>
  </div>

  <!-- ===== NỘI DUNG CHÍNH ===== -->
  <div class="container">

    <!-- Nút lọc thể loại -->
    <div class="section-header">
      <h2>📚 Danh sách truyện</h2>
    </div>

    <div class="filter-bar">
      <!-- data-loai dùng để JS nhận biết lọc theo loại nào -->
      <button class="filter-btn active" data-loai="tat-ca">Tất cả</button>
      <button class="filter-btn" data-loai="tieu-thuyet">Tiểu thuyết</button>
      <button class="filter-btn" data-loai="ngon-tinh">Ngôn tình</button>
      <button class="filter-btn" data-loai="trinh-tham">Trinh thám</button>
      <button class="filter-btn" data-loai="viet-nam">Việt Nam</button>
    </div>

    <!-- JS sẽ tự động điền thẻ truyện vào đây -->
    <div class="story-grid" id="story-grid"></div>

  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    © 2025 TruyệnHay · Tất cả nội dung chỉ mang tính minh họa
  </footer>

  <!-- Liên kết JS — đặt cuối body để HTML load trước -->
  <script src="js/data.js"></script>
  <script src="js/home.js"></script>

</body>
</html>
